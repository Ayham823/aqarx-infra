name: Deploy Qivro

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}

    steps:
      - name: Check required deployment secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          test -n "$EC2_HOST" || (echo "Missing EC2_HOST secret" && exit 1)
          test -n "$EC2_USER" || (echo "Missing EC2_USER secret" && exit 1)
          test -n "$SSH_KEY" || (echo "Missing SSH_KEY secret" && exit 1)

      - name: Deploy on EC2 through SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_ENV: ${{ inputs.target }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_ENV
          script: |
            cd "${DEPLOY_PATH:-$HOME/aqarx-infra}"
            DEPLOY_ENV="${DEPLOY_ENV:-production}" bash scripts/deploy.sh
