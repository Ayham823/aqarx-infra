services:
  postgres:
    image: postgres:16
    container_name: aqarx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aqarx
      POSTGRES_PASSWORD: aqarxpass
      POSTGRES_DB: aqarx
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ai:
    build:
      context: ../real-estate-ai
      dockerfile: Dockerfile
    image: aqarx-ai:latest
    container_name: aqarx-ai
    restart: unless-stopped
    environment:
      LLM_PROVIDER: mock
    ports:
      - "8000:8000"

  backend:
    build:
      context: /mnt/c/Users/Win11/real-estate-backend
      dockerfile: Dockerfile
    image: aqarx-backend:latest
    container_name: aqarx-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - ai
    environment:
      DATABASE_URL: postgresql://aqarx:aqarxpass@postgres:5432/aqarx
      JWT_SECRET: dev_secret_change_later
      FRONTEND_URL: http://localhost:3000
      ADMIN_FRONTEND_URL: http://localhost:3002
      CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      AI_SERVICE_URL: http://ai:8000
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: "${EMAIL_FROM:-Qivro <no-reply@qivro.local>}"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_UPLOAD_FOLDER: ${CLOUDINARY_UPLOAD_FOLDER:-qivro/listings}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../real-estate-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3001/api
        NEXT_PUBLIC_BROWSER_API_URL: http://localhost:3001/api
    image: aqarx-frontend:latest
    container_name: aqarx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      NEXT_PUBLIC_BROWSER_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"

  admin:
    build:
      context: ../real-estate-ui
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3001/api
        NEXT_PUBLIC_BROWSER_API_URL: http://localhost:3001/api
    image: aqarx-admin:latest
    container_name: aqarx-admin
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api
      NEXT_PUBLIC_BROWSER_API_URL: http://localhost:3001/api
    ports:
      - "3002:3002"

volumes:
  postgres_data:
